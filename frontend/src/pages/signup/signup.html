<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reelify - Signup</title>
    <link rel="stylesheet" href="./signup.css">
</head>
<body>

    <div class="container">

        <div class="logo">
            🎬
        </div>

        <h1>Reelify</h1>

        <p class="subtitle">
            Create your account
        </p>

        <form id="signup-form">

            <input
                type="text"
                id="fullName"
                placeholder="Full Name"
                required
            >

            <input
                type="text"
                id="username"
                placeholder="Username"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Sign Up
            </button>

        </form>

        <p class="footer-text">
            Already have an account?
            <a href="../login/login.html">
                Login
            </a>
        </p>

    </div>

    <script type="module" src="./signup.js"></script>

</body>
</html>
