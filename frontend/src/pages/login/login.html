<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reelify - Login</title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>

    <div class="container">

        <div class="logo">
            🎬
        </div>

        <h1>Reelify</h1>

        <p class="subtitle">
            Share your moments
        </p>

        <form id="login-form">

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p class="footer-text">
            Don't have an account?
            <a href="../signup/signup.html">
                Sign Up
            </a>
        </p>

    </div>

    <script type="module" src="./login.js"></script>

</body>
</html>
